<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetWear Shop - E-commerce</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- GSAP para animações -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#home" style="font-size: 20px;">
        <img src="/img/logo.png" alt="StreetWear Shop Logo" style="height: 100px;">
      </a>
      <div class="d-flex align-items-center">
        <span class="text-light me-3" style="font-size: 20px;">
          Carrinho: <span id="carrinhoCount" class="badge bg-danger">0</span>
        </span>
        <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCart" style="font-size: 20px;">
          <i class="bi bi-cart3"></i> Ver Carrinho
        </button>
      </div>
    </div>
  </nav>

  <!-- CARROSSEL -->
  <section id="hero" class="hero-section">
    <div id="carouselHero" class="carousel slide" data-bs-ride="carousel" style="min-height: 70vh;">
      <div class="carousel-inner" style="height: 70vh;">
        <div class="carousel-item active" style="height: 100%;">
          <img src="/img/carrossel1.png" class="d-block w-100" alt="Imagem 1" style="object-fit: contain; height: 100%;">
        </div>
        <div class="carousel-item" style="height: 100%;">
          <img src="/img/carrosel2.png" class="d-block w-100" alt="Imagem 2" style="object-fit: contain; height: 100%;">
        </div>
        <div class="carousel-item" style="height: 100%;">
          <img src="/img/carrossel3.png" class="d-block w-100" alt="Imagem 3" style="object-fit: contain; height: 100%;">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselHero" data-bs-slide="prev" style="z-index: 10;">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselHero" data-bs-slide="next" style="z-index: 10;">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <!-- PRODUTOS -->
  <section id="produtos" class="produtos-section py-5">
    <div class="container">
      <h2 class="text-center mb-5 section-title">COLEÇÃO PREMIUM</h2>

      <div id="produtosContainer" class="row g-4">
        <!-- Produtos carregados via JavaScript -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center">
      <p>&copy; 2024 StreetWear Shop. Todos os direitos reservados.</p>
    </div>
  </footer>

  <!-- CARRINHO OFFCANVAS -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCart">
    <div class="offcanvas-header bg-dark text-light">
      <h5 class="offcanvas-title">Meu Carrinho</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="carrinhoItems">
        <p class="text-muted">Seu carrinho está vazio</p>
      </div>
      <div id="carrinhoTotal" class="mt-4" style="display: none;">
        <hr>
        <h5>Total: R$ <span id="totalPrice">0.00</span></h5>
        <button class="btn btn-dark w-100 mt-3">Finalizar Compra</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/carrinho.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
